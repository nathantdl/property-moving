<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PropertyMove</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        /* Side */
        .sidebar {
            width: 260px;
            background: var(--white);
            border-right: 1px solid #e5e7eb;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 2rem;
        }

        .sidebar-nav {
            flex: 1;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            border-radius: var(--radius-md);
            color: var(--text-light);
            font-weight: 500;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: var(--secondary-color);
            color: var(--primary-color);
        }

        .sidebar-user {
            padding: 1rem;
            background: var(--secondary-color);
            border-radius: var(--radius-md);
            margin-top: auto;
        }

        .sidebar-user .user-name {
            font-weight: 600;
            color: var(--text-dark);
        }

        .sidebar-user .user-email {
            font-size: 0.875rem;
            color: var(--text-light);
        }

        .logout-btn {
            margin-top: 0.75rem;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            margin-bottom: 0;
        }

        /* Property Grid */
        .property-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .property-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .property-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .property-card h3 {
            margin-bottom: 0.5rem;
        }

        .property-card .property-meta {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .property-card .property-actions {
            display: flex;
            gap: 0.5rem;
        }

        .property-card .btn {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        /* Request List */
        .request-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .request-item {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .request-item .request-info h4 {
            margin-bottom: 0.25rem;
        }

        .request-item .request-info p {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            margin-bottom: 0;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .empty-state h3 {
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        /* View container */
        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                flex-direction: row;
                padding: 1rem;
                align-items: center;
                overflow-x: auto;
            }

            .sidebar-logo {
                margin-bottom: 0;
                margin-right: 1rem;
            }

            .sidebar-nav {
                display: flex;
                gap: 0.5rem;
            }

            .sidebar-nav a {
                margin-bottom: 0;
                white-space: nowrap;
            }

            .sidebar-user {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">PropertyMove</div>
            <nav class="sidebar-nav">
                <a href="#" data-view="properties" class="active">🏠 My Properties</a>
                <a href="#" data-view="requests">🚚 My Requests</a>
            </nav>
            <div class="sidebar-user">
                <div class="user-name" id="user-name">User</div>
                <div class="user-email" id="user-email">user@email.com</div>
                <button class="btn btn-secondary logout-btn" id="logout-btn">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Properties View -->
            <div id="properties-view" class="view active">
                <div class="page-header">
                    <h1>My Properties</h1>
                    <button class="btn" id="add-property-btn">+ Add Property</button>
                </div>
                <div id="properties-list" class="property-grid">
                    <!-- Properties will be rendered here -->
                </div>
            </div>

            <!-- Requests View -->
            <div id="requests-view" class="view">
                <div class="page-header">
                    <h1>My Moving Requests</h1>
                    <button class="btn" id="add-request-btn">+ New Request</button>
                </div>
                <div id="requests-list" class="request-list">
                    <!-- Requests will be rendered here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Property Modal -->
    <div class="modal-overlay" id="property-modal">
        <div class="modal">
            <h2 id="property-modal-title">Add Property</h2>
            <form id="property-form">
                <input type="hidden" id="property-id">
                <div class="form-group">
                    <label for="property-name">Property Name</label>
                    <input type="text" id="property-name" placeholder="e.g., Sunset Villa" required>
                </div>
                <div class="form-group">
                    <label for="property-type">Property Type</label>
                    <select id="property-type" required>
                        <option value="">Select type...</option>
                        <option value="House">House</option>
                        <option value="Apartment">Apartment</option>
                        <option value="Office">Office</option>
                        <option value="Warehouse">Warehouse</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="property-location">Location</label>
                    <input type="text" id="property-location" placeholder="e.g., Downtown, City Name" required>
                </div>
                <div class="form-group">
                    <label for="property-size">Size (Optional)</label>
                    <input type="text" id="property-size" placeholder="e.g., 1200 sqft">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-property-btn">Cancel</button>
                    <button type="submit" class="btn">Save Property</button>
                </div>
            </form>
        </div>
    </div>

    <!-- New Request Modal -->
    <div class="modal-overlay" id="request-modal">
        <div class="modal">
            <h2>Request Moving Service</h2>
            <form id="request-form">
                <div class="form-group">
                    <label for="request-property">Select Property</label>
                    <select id="request-property" required>
                        <option value="">Choose a property...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="request-from">Current Location</label>
                    <input type="text" id="request-from" placeholder="Pick-up address" required>
                </div>
                <div class="form-group">
                    <label for="request-to">Destination</label>
                    <input type="text" id="request-to" placeholder="Drop-off address" required>
                </div>
                <div class="form-group">
                    <label for="request-date">Preferred Moving Date</label>
                    <input type="date" id="request-date" required>
                </div>
                <div class="form-group">
                    <label for="request-items">Items Description</label>
                    <textarea id="request-items" rows="3"
                        placeholder="e.g., Furniture, Electronics, Boxes..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-request-btn">Cancel</button>
                    <button type="submit" class="btn">Submit Request</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
