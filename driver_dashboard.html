<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard - PropertyMove</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--white);
            border-right: 1px solid #e5e7eb;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 2rem;
        }

        .sidebar-nav {
            flex: 1;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            border-radius: var(--radius-md);
            color: var(--text-light);
            font-weight: 500;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: var(--secondary-color);
            color: var(--primary-color);
        }

        .sidebar-user {
            padding: 1rem;
            background: var(--secondary-color);
            border-radius: var(--radius-md);
            margin-top: auto;
        }

        .sidebar-user .user-name {
            font-weight: 600;
            color: var(--text-dark);
        }

        .sidebar-user .user-email {
            font-size: 0.875rem;
            color: var(--text-light);
        }

        .logout-btn {
            margin-top: 0.75rem;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            margin-bottom: 0;
        }

        /* Request List */
        .request-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .request-item {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .request-item .request-info h4 {
            margin-bottom: 0.25rem;
        }

        .request-item .request-info p {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .request-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .empty-state h3 {
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        /* View container */
        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                flex-direction: row;
                padding: 1rem;
                align-items: center;
                overflow-x: auto;
            }

            .sidebar-logo {
                margin-bottom: 0;
                margin-right: 1rem;
            }

            .sidebar-nav {
                display: flex;
                gap: 0.5rem;
            }

            .sidebar-nav a {
                margin-bottom: 0;
                white-space: nowrap;
            }

            .sidebar-user {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">Driver Panel</div>
            <nav class="sidebar-nav">
                <a href="#" data-view="available" class="active">📍 Available Requests</a>
                <a href="#" data-view="active-jobs">🚛 My Active Jobs</a>
            </nav>
            <div class="sidebar-user">
                <div class="user-name" id="user-name">Driver</div>
                <div class="user-email" id="user-email">driver@email.com</div>
                <button class="btn btn-secondary logout-btn" id="logout-btn">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Available Requests View -->
            <div id="available-view" class="view active">
                <div class="page-header">
                    <h1>Available Requests</h1>
                </div>
                <div id="available-list" class="request-list">
                    <!-- Requests will be rendered here -->
                </div>
            </div>

            <!-- Active Jobs View -->
            <div id="active-jobs-view" class="view">
                <div class="page-header">
                    <h1>My Active Jobs</h1>
                </div>
                <div id="active-list" class="request-list">
                    <!-- Active jobs will be rendered here -->
                </div>
            </div>
        </main>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/driver_app.js"></script>
</body>

</html>
