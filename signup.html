<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PropertyMove</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            background: var(--white);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
        }

        .auth-card h1 {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .auth-card p {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        .form-group input {
            margin-bottom: 0;
        }

        .auth-card .btn {
            width: 100%;
            margin-top: 1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-light);
        }

        .error-message {
            background-color: #fef2f2;
            color: #b91c1c;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
            display: none;
        }

        .success-message {
            background-color: #ecfdf5;
            color: #065f46;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Create Account</h1>
            <p>Start managing your properties today</p>

            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>

            <form id="signup-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="role">Account Type</label>
                    <select id="role" required>
                        <option value="user">Property Owner / User</option>
                        <option value="driver">Driver</option>
                    </select>
                </div>
                <button type="submit" class="btn">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Redirect-if already logged-in
        if (Storage.getCurrentUser()) {
            window.location.href = 'dashboard.html';
        }

        const form = document.getElementById('signup-form');
        const errorDiv = document.getElementById('error-message');
        const successDiv = document.getElementById('success-message');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            const result = Auth.signup(name, email, password, role);

            if (result.success) {
                errorDiv.style.display = 'none';
                successDiv.textContent = result.message + ' Redirecting to login...';
                successDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } else {
                successDiv.style.display = 'none';
                errorDiv.textContent = result.message;
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>

</html>
